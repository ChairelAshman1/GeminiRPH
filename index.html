<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini RPH Simple</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; min-height: 100vh; }
    .container { max-width: 900px; margin: auto; padding: 1rem; }
    h1 { margin-bottom: 0.4rem; color: #60a5fa; }
    label { display: block; margin: 0.6rem 0 0.15rem; font-size: 0.85rem; color: #94a3b8; }
    input, button, select, textarea { width: 100%; border-radius: 0.45rem; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; padding: 0.6rem; font-size: 0.95rem; }
    button { cursor: pointer; background: #2563eb; color: #fff; border: none; margin-top: 0.45rem; min-height: 38px; }
    button:hover { background: #1d4ed8; }
    .row { display: flex; gap: 0.6rem; margin-top: 0.25rem; }
    .row > * { flex: 1; }
    .small-btn { width: 160px; flex: 0 0 auto; }
    .panel { margin-top: 1rem; border: 1px solid #334155; background: #111827; padding: 0.75rem; border-radius: 0.6rem; }
    .pill { display: inline-block; margin: 0.2rem 0.2rem 0.2rem 0; padding: 0.35rem 0.65rem; border-radius: 999px; border: 1px solid #334155; background: #334155; cursor: pointer; }
    .pill.active { background: #2563eb; border-color: #60a5fa; }
    .list-item { display: flex; align-items: center; gap: 0.6rem; border-bottom: 1px solid #334155; padding: 0.45rem 0; }
    .list-item label { flex: 1; }
    .msg { margin-top: 0.8rem; font-size: 0.88rem; color: #94a3b8; }
    .output-card { background: #1f2937; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.55rem; margin-top: 0.5rem; }
    .output-card h3 { margin: 0 0 0.35rem 0; font-size: 0.93rem; }
    .output-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 0.4rem; margin-top: 0.4rem; }
    .output-grid>div { background:#111827; padding:0.4rem; border:1px solid #334155; border-radius:0.35rem; min-height:2.4rem; }
    .flex-right { display:flex; justify-content:flex-end; gap:0.4rem; margin-top:0.5rem; }
    .badge { font-size:0.8rem; padding:0.2rem 0.45rem; border-radius:999px; background:#334155; color:#cbd5e1; }
    .hide { display:none !important; }
    pre { white-space: pre-wrap; word-wrap: break-word; margin:0; font-size:0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gemini RPH - Main</h1>

    <label for="scriptUrl">Apps Script URL (Web App Exec):</label>
    <input id="scriptUrl" placeholder="https://script.google.com/macros/s/XXX/exec" value="" />

    <label for="apiKey">Google AI Studio API Keys (satu atau lebih):</label>
    <div class="row">
      <input id="apiKey" type="password" placeholder="AIza... atau sk-..." style="flex: 1;" />
      <button id="btnSaveApiKey" class="small-btn">Tambah & Simpan</button>
    </div>
    <div id="apiKeyList" style="margin-top:0.5rem;"></div>

    <label for="sheetUrl">Google Spreadsheet URL:</label>
    <input id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/xxx/edit" />

    <div class="row">
      <button id="btnConnect" class="small-btn">Sambung Spreadsheet</button>
      <button id="btnReload" class="small-btn">Refresh Harian</button>
      <button id="btnSaveConfig" class="small-btn" style="background:#10b981;">💾 Simpan Web App/Sheet</button>
    </div>

    <div class="flex-right" style="margin-top:0.45rem; gap:0.45rem;">
      <button id="btnLoading" class="small-btn hide" disabled style="background:#64748b;">⏳ Loading...</button>
    </div>

    <div id="status" class="msg">Sila masukkan URL dan sambung.</div>

    <div id="dayPanel" class="panel hide">
      <div><strong>Hari Ditemui:</strong></div>
      <div id="dayButtons"></div>
    </div>

    <div id="classPanel" class="panel hide">
      <div class="flex-right"><span class="badge" id="classCount">0 kelas</span></div>
      <div id="classList"></div>
    </div>

    <div id="actionPanel" class="panel hide">
      <button id="btnGenerate" >✨ Jana RPH Untuk Kelas Terpilih</button>
      <button id="btnFill" style="background:#059669;">🖱 Isi RPH ke Sheet</button>
      <div id="generateInfo" class="msg">Tiada RPH dijana lagi.</div>
    </div>

    <div id="resultPanel" class="panel hide">
      <h2 style="font-size:1rem;">Hasil RPH</h2>
      <div id="resultList"></div>
    </div>
  </div>

  <script>
    const STORAGE_API_KEYS = 'gemini_rph_api_keys';
    const STORAGE_SCRIPT_URL = 'gemini_rph_script_url';
    const STORAGE_SHEET_URL = 'gemini_rph_sheet_url';
    let selectedApiKey = '';

    const state = {
      sheetId: '',
      selectedDaySheet: null,
      daySheets: [],
      classItems: [],
      generated: []
    };

    const $ = id => document.getElementById(id);

    const getStoredApiKeys = () => {
      try {
        const raw = localStorage.getItem(STORAGE_API_KEYS);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch (e) {
        return [];
      }
    };

    const persistApiKeys = (keys) => {
      localStorage.setItem(STORAGE_API_KEYS, JSON.stringify(keys));
    };

    const renderApiKeyList = () => {
      const container = $('apiKeyList');
      const keys = getStoredApiKeys();
      if (!keys.length) {
        container.innerHTML = '<div style="font-size:0.85rem;color:#94a3b8;">Tiada API Key disimpan.</div>';
        return;
      }
      container.innerHTML = keys.map((key, index) => {
        const short = key.length > 8 ? key.slice(0, 6) + '...' + key.slice(-4) : key;
        const isActive = key === selectedApiKey;
        return `
          <div style="display:flex; align-items:center; gap:0.45rem; margin-bottom:0.35rem;">
            <button class="pill ${isActive ? 'active' : ''}" style="padding:0.25rem 0.45rem; border-radius:0.35rem;" data-key="${key}" type="button">${short}</button>
            <button class="small-btn" style="background:#dc2626;">Padam</button>
          </div>
        `;
      }).join('');

      container.querySelectorAll('.pill').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedApiKey = btn.dataset.key;
          $('apiKey').value = selectedApiKey;
          renderApiKeyList();
          showStatus('API Key dipilih: ' + (btn.textContent || '').toString(), 'success');
        });
      });

      container.querySelectorAll('.small-btn').forEach((btn, i) => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const keys = getStoredApiKeys();
          const removed = keys.splice(i, 1)[0];
          persistApiKeys(keys);
          if (removed === selectedApiKey) {
            selectedApiKey = keys[0] || '';
            $('apiKey').value = selectedApiKey;
          }
          renderApiKeyList();
          showStatus('API Key dipadam.', 'info');
        });
      });
    };

    const addApiKey = () => {
      const key = $('apiKey').value.trim();
      if (!key) { showStatus('Sila masukkan API key.', 'error'); return; }
      if (!(key.startsWith('AIza') || key.startsWith('sk-')|| key.length >= 20)) {
        showStatus('Key nampak tidak sah. Masukkan key Google AI Studio atau OpenAI.', 'error');
        return;
      }
      const keys = getStoredApiKeys();
      if (keys.includes(key)) {
        showStatus('Key sudah wujud dalam sistem.', 'info');
        return;
      }
      keys.push(key);
      persistApiKeys(keys);
      selectedApiKey = key;
      renderApiKeyList();
      showStatus('Key ditambah. Pilih satu untuk digunakan.', 'success');
    };

    const getActiveApiKey = () => {
      const keys = getStoredApiKeys();
      if (selectedApiKey && keys.includes(selectedApiKey)) return selectedApiKey;
      if (keys.length > 0) return keys[0];
      return '';
    };

    const getSheetId = (url) => {
      try {
        if (!url) return '';
        const trimmed = url.trim();
        // new style URL
        let match = trimmed.match(/\/d\/([a-zA-Z0-9-_]+)/);
        if (match) return match[1];
        // fallback for ?id=...
        match = trimmed.match(/[?&]id=([a-zA-Z0-9-_]+)/);
        if (match) return match[1];
        // accept raw id
        if (/^[a-zA-Z0-9-_]{10,}$/.test(trimmed)) return trimmed;
        return '';
      } catch (e) { return ''; }
    };

    const showStatus = (text, type = 'info') => {
      const el = $('status');
      el.textContent = text;
      if (type==='error') el.style.color = '#fca5a5';
      else if (type==='success') el.style.color = '#86efac';
      else el.style.color = '#cbd5e1';
    };

    const setLoading = (isLoading, loadingText = 'Sedang memproses...') => {
      const btn = $('btnLoading');
      if (isLoading) {
        btn.classList.remove('hide');
        btn.disabled = true;
        btn.textContent = '⏳ ' + loadingText;
      } else {
        btn.classList.add('hide');
        btn.disabled = false;
        btn.textContent = '⏳ Loading...';
      }
    };

    const getApiUrl = () => {
      let url = $('scriptUrl').value.trim();
      if (!url) {
        showStatus('Sila masukkan Apps Script URL.', 'error');
        return null;
      }
      url = url.replace(/\/+$/,'');
      localStorage.setItem(STORAGE_SCRIPT_URL, url);
      return url;
    };

    const saveSheetUrl = (url) => {
      if (!url) return;
      localStorage.setItem(STORAGE_SHEET_URL, url);
    };

    const loadSettings = () => {
      const scriptUrl = localStorage.getItem(STORAGE_SCRIPT_URL) || '';
      if (scriptUrl) $('scriptUrl').value = scriptUrl;
      const sheetUrl = localStorage.getItem(STORAGE_SHEET_URL) || '';
      if (sheetUrl) $('sheetUrl').value = sheetUrl;

      const apiKey = localStorage.getItem('gemini_rph_last_key') || '';
      if (apiKey) {
        selectedApiKey = apiKey;
        $('apiKey').value = apiKey;
      }
      renderApiKeyList();
    };

    const saveSettings = () => {
      const scriptUrl = $('scriptUrl').value.trim();
      const sheetUrl = $('sheetUrl').value.trim();
      if (scriptUrl) localStorage.setItem(STORAGE_SCRIPT_URL, scriptUrl.replace(/\/+$/,''));
      if (sheetUrl) localStorage.setItem(STORAGE_SHEET_URL, sheetUrl);
      showStatus('Tetapan disimpan (Web App + Spreadsheet).', 'success');
    };

    async function apiGet(params) {
      const base = getApiUrl(); if (!base) throw new Error('Tiada URL');
      const query = new URLSearchParams(params).toString();
      const resp = await fetch(`${base}?${query}`, { method:'GET' });
      return resp.json();
    }

    async function apiPost(body) {
      const base = getApiUrl(); if (!base) throw new Error('Tiada URL');
      const resp = await fetch(base, {
        method:'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return resp.json();
    }

    const getDaySheetNames = (list) => {
      const days = ['Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu','Ahad', 'Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
      return list.filter(name => days.some(d => name.toLowerCase().includes(d.toLowerCase())));
    };

    const renderDayButtons = () => {
      const container = $('dayButtons');
      container.innerHTML='';
      if (!state.daySheets.length) {
        container.innerHTML = '<span style="color:#94a3b8;">Tiada hari dijumpai.</span>';
        return;
      }
      state.daySheets.forEach(sheetName => {
        const btn = document.createElement('button');
        btn.textContent = sheetName;
        btn.className = 'pill ' + (state.selectedDaySheet===sheetName ? 'active' : '');
        btn.onclick = () => selectDaySheet(sheetName);
        container.appendChild(btn);
      });
    };

    const selectDaySheet = async (sheetName) => {
      state.selectedDaySheet = sheetName;
      renderDayButtons();
      showStatus(`Sheet hari dipilih: ${sheetName}`, 'success');
      setLoading(true, 'Memuat data kelas...');
      try {
        const readResp = await apiGet({ action:'read', sheetId: state.sheetId, sheetName, range:'A2:A200' });
        if (readResp.status !== 'ok') throw new Error(readResp.message || 'Gagal baca');

        const flat = (readResp.values || []).map(row => (row[0] || '').toString().trim()).filter(Boolean);
        state.classItems = flat.map((cls, idx) => ({ id: idx, name: cls, selected: false }));
        renderClassList();

      } catch (err) {
        showStatus('Error baca kelas: ' + err.message, 'error');
      } finally {
        setLoading(false);
      }
    };

    const renderClassList = () => {
      const p = $('classPanel');
      const container = $('classList');
      if (!state.classItems.length) {
        container.innerHTML = '<em>Tiada kelas ditemui dalam lembar kerja ini.</em>';
        $('classCount').textContent = '0 kelas';
        p.classList.remove('hide');
        $('actionPanel').classList.add('hide');
        $('resultPanel').classList.add('hide');
        return;
      }

      const listHtml = state.classItems.map(item => {
        const checked = item.selected ? 'checked' : '';
        return `<div class='list-item'><input type='checkbox' data-id='${item.id}' ${checked} /><label>${item.name}</label></div>`;
      }).join('');
      container.innerHTML = listHtml;

      container.querySelectorAll('input[type=checkbox]').forEach(el => {
        el.addEventListener('change', (e) => {
          const id = Number(e.target.dataset.id);
          const found = state.classItems.find(x => x.id === id);
          if (found) found.selected = e.target.checked;
          $('classCount').textContent = `${state.classItems.filter(x=>x.selected).length} dipilih`;
          const any = state.classItems.some(x=>x.selected);
          if (any) $('actionPanel').classList.remove('hide');
          else $('actionPanel').classList.add('hide');
        });
      });

      $('classCount').textContent = `${state.classItems.length} kelas`; 
      p.classList.remove('hide');
      $('actionPanel').classList.add('hide');
      $('resultPanel').classList.add('hide');
    };

    async function callGoogleAI(promptText, key) {
      const url = 'https://generativelanguage.googleapis.com/v1beta2/models/text-bison-001:generate';
      const resp = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + key
        },
        body: JSON.stringify({
          prompt: { text: promptText },
          temperature: 0.85,
          candidateCount: 1,
          maxOutputTokens: 600
        })
      });

      const body = await resp.json();
      if (!resp.ok) {
        const err = body.error && body.error.message ? body.error.message : ('HTTP ' + resp.status);
        throw new Error(err);
      }

      if (!body.candidates || !body.candidates.length || !body.candidates[0].output) {
        throw new Error('Tiada output dari API AI (tiada candidates).');
      }
      return body.candidates[0].output;
    }

    const generateRPH = async () => {
      const selected = state.classItems.filter(x => x.selected);
      if (!selected.length) {
        showStatus('Pilih sekurang-kurangnya satu kelas.', 'error');
        return;
      }

      const keys = getStoredApiKeys();
      if (!keys.length) {
        showStatus('Sila tambah sekurang-kurangnya satu Google AI Studio API key.', 'error');
        return;
      }

      setLoading(true, 'Menjana RPH...');
      showStatus('Mencuba menjana RPH menggunakan Google AI Studio...', 'info');
      const classNames = selected.map(x => x.name).join(', ');
      const basePrompt = `Sediakan RPH untuk setiap kelas berikut: ${classNames}. Jelaskan dalam format JSON array: [{className, objektif, kriteria, aktiviti}].`;

      let resolved = false;
      let lastError = null;
      for (const key of keys) {
        try {
          const aiText = await callGoogleAI(basePrompt, key);

          let parsed = [];
          try {
            parsed = JSON.parse(aiText.trim());
          } catch (err) {
            const jsonMatch = aiText.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
            if (jsonMatch) parsed = JSON.parse(jsonMatch[0]);
          }

          if (Array.isArray(parsed) && parsed.length) {
            state.generated = parsed.map(item => ({
              className: item.className || item.kelas || '',
              objektif: item.objektif || item.objective || '',
              kriteria: item.kriteria || item.criteria || '',
              aktiviti: item.aktiviti || item.activity || ''
            }));
            selectedApiKey = key;
            $('apiKey').value = key;
            showStatus('RPH berjaya dijana dengan API key terpilih.', 'success');
            resolved = true;
            break;
          }

          lastError = new Error('Format AI tidak JSON bermula');
          showStatus(`API key gagal (tiada JSON). Mencuba key seterusnya...`, 'error');
        } catch (err) {
          lastError = err;
          showStatus(`API key gagal: ${err.message}. Mencuba key seterusnya...`, 'error');
          continue;
        }
      }

      if (!resolved) {
        state.generated = selected.map(cls => ({
          className: cls.name,
          objektif: `Objektif: Mencapai pembelajaran ${cls.name}`,
          kriteria: `Kriteria Kejayaan: Pelajar mampu menerangkan ${cls.name}`,
          aktiviti: `Aktiviti: Latihan, perbincangan dan refleksi ${cls.name}`
        }));
        showStatus('Semua key gagal. Gunakan fallback automatik. ' + (lastError ? lastError.message : ''), 'error');
      }

      renderGenerated();
      setLoading(false);
    };

    const renderGenerated = () => {
      const panel = $('resultPanel');
      const container = $('resultList');
      if (!state.generated.length) {
        container.innerHTML = '<em>Tiada RPH dijana.</em>';
        panel.classList.remove('hide');
        return;
      }

      container.innerHTML = state.generated.map(item => `
        <div class='output-card'>
          <h3>${item.className}</h3>
          <div class='output-grid'>
            <div><strong>Objektif</strong><br><pre>${item.objektif}</pre></div>
            <div><strong>Kriteria Kejayaan</strong><br><pre>${item.kriteria}</pre></div>
            <div><strong>Aktiviti</strong><br><pre>${item.aktiviti}</pre></div>
          </div>
        </div>
      `).join('');

      panel.classList.remove('hide');
      $('generateInfo').textContent = `${state.generated.length} RPH dijana.`;
    };

    const fillRPH = async () => {
      if (!state.generated.length) {
        showStatus('Tidak ada data RPH untuk diisi.', 'error');
        return;
      }
      if (!state.selectedDaySheet) {
        showStatus('Pilih satu hari terlebih dahulu.', 'error');
        return;
      }

      setLoading(true, 'Mengisi RPH ke Spreadsheet...');
      try {
        const payload = {
          action: 'appendRPH',
          sheetId: state.sheetId,
          sheetName: state.selectedDaySheet,
          rows: state.generated
        };

        const resp = await apiPost(payload);
        if (resp.status === 'ok') {
          showStatus('RPH berjaya diisi: ' + resp.message, 'success');
        } else {
          throw new Error(resp.message || 'Operasi gagal');
        }
      } catch (err) {
        showStatus('Error tulis ke sheet: ' + err.message, 'error');
      } finally {
        setLoading(false);
      }
    };

    $('btnConnect').addEventListener('click', async () => {
      const scriptUrl = $('scriptUrl').value.trim();
      if (!scriptUrl) {
        showStatus('Sila masukkan Apps Script URL (Web App).', 'error');
        return;
      }

      const sheetUrl = $('sheetUrl').value.trim();
      const sheetId = getSheetId(sheetUrl);
      if (!sheetId) {
        showStatus('URL spreadsheet tidak sah. Pastikan anda menyalin URL lengkap atau ID sahaja.', 'error');
        return;
      }
      state.sheetId = sheetId;
      saveSheetUrl(sheetUrl);

      setLoading(true, 'Menyambung ke spreadsheet...');
      try {
        const data = await apiGet({ action:'listSheets', sheetId });
        if (!data || data.status !== 'ok') {
          throw new Error(data ? (data.message || 'Gagal terima list') : 'Tiada respons');
        }

        const dayList = getDaySheetNames(data.sheets || []);
        state.daySheets = dayList;
        state.selectedDaySheet = null;
        renderDayButtons();

        $('dayPanel').classList.remove('hide');
        $('classPanel').classList.add('hide');
        $('actionPanel').classList.add('hide');
        $('resultPanel').classList.add('hide');

        showStatus(`Berjaya sambung. Ditemui ${dayList.length} sheet hari.` ,'success');
      } catch (err) {
        let message = err.message || err.toString();
        message += ' (Pastikan Web App telah dideploy dan akses spreadsheet berkongsi dengan owner Apps Script)';
        showStatus('Gagal sambung: ' + message, 'error');
      } finally {
        setLoading(false);
      }
    });


    // Load saved settings and API key list on startup
    loadSettings();

    $('btnSaveApiKey').addEventListener('click', addApiKey);
    $('btnReload').addEventListener('click', async () => $('btnConnect').click());
    $('btnSaveConfig').addEventListener('click', saveSettings);
    $('btnGenerate').addEventListener('click', generateRPH);
    $('btnFill').addEventListener('click', fillRPH);
  </script>
</body>
</html>
